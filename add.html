<!DOCTYPE html>
<html>
<head>
    <title>Add Student ID</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #141e30, #243b55);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .box {
            background: rgba(0,0,0,0.7);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            width: 300px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border-radius: 8px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border-radius: 8px;
            border: none;
            background: #00c6ff;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #0072ff;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Add Student ID</h2>

    <form action="add.php" method="POST">
        <input type="text" name="student_id" placeholder="New ID" required>
        <button type="submit">Add</button>
    </form>
</div>

</body>
</html>
