<!DOCTYPE html>
<html>
<head>
    <title>IC-IT Portal</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;

            /* BACKGROUND IMAGE */
            background: url('crt.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        /* DARK OVERLAY */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(0,0,0,0.7);
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            opacity: 0.85;
        }

        a {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #00c6ff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        a:hover {
            background: #0072ff;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>Welcome to IC-IT Portal</h1>
    <p>Access granted successfully</p>

    <a href="https://mikejustinesmiranda-hub.github.io/caps/index.html" target="_blank">
        Open Portal
    </a>
</div>

</body>
</html>
