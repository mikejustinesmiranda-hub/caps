<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IC-iT | Video Tutorial</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right, #000000, #1e3a8a);
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      background: rgba(0,0,0,0.7);
      font-size: 24px;
      font-weight: bold;
    }

    /* 🔥 NEW BACK BUTTON */
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: #00c6ff;
      color: white;
      padding: 10px 15px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
      z-index: 1000;
    }

    .back-btn:hover {
      background: #0072ff;
      transform: scale(1.05);
    }

    .container {
      padding: 40px;
    }

    .video-box {
      max-width: 900px;
      margin: auto;
      background: rgba(0,0,0,0.5);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    iframe {
      width: 100%;
      height: 500px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<!-- 🔥 NEW BACK BUTTON -->
<a href="index.html" class="back-btn">⬅ Back</a>

<header>
  🎥 IC-iT Video Tutorial Page
</header>

<div class="container">

  <div class="video-box">
    <h2>Lesson Video</h2>

    <iframe 
      src="https://www.youtube.com/embed/dQw4w9WgXcQ"
      allowfullscreen>
    </iframe>

    <p>Change this video anytime by editing this file (video.html)</p>
  </div>

</div>

</body>
</html>
